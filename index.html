<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeetingReferee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="hero-eyebrow">MeetingReferee Prototype</p>
        <h1>회의 품질을 실시간으로 심판합니다</h1>
        <p class="hero-copy">
          Deepgram 화자 분리 이벤트를 받아 발언 지분, 독점 경고, 침묵 참여자, 비효율 패턴을
          실시간으로 확인하는 MVP입니다.
        </p>
      </header>

      <section class="view view-lobby active">
        <article class="panel-card lobby-card">
          <h2>회의 대기/입장</h2>
          <div class="form-grid">
            <label>
              회의 제목
              <input id="meeting-title" type="text" value="주간 스프린트 회의" />
            </label>
            <label>
              참여자 수
              <input id="meeting-participants" type="number" min="2" max="20" value="4" />
            </label>
          </div>
          <div class="actions">
            <button id="start-meeting" class="btn btn-primary">회의 시작</button>
          </div>
          <p class="hint">프로토타입은 모의 Deepgram 스트림으로 동작하며, 1초를 10초로 스케일링합니다.</p>
        </article>
      </section>
    </main>

    <script type="module" src="./lobby.js"></script>
  </body>
</html>
