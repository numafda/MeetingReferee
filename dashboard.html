<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회의 진행 중 – MeetingReferee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="view view-dashboard active">
        <div class="topbar-live">
          <div class="topbar-live-status">
            <span class="dot-live" aria-hidden="true"></span>
            <div>
              <p class="topbar-live-title">회의 진행 중</p>
              <p id="connection-status" class="topbar-live-copy">연결 준비 중...</p>
            </div>
          </div>
          <div class="topbar-live-actions">
            <p id="meeting-elapsed" class="elapsed-clock">00:00</p>
            <button id="pause-meeting" class="btn btn-pause">일시정지</button>
            <button id="end-meeting" class="btn btn-danger">회의 종료</button>
          </div>
        </div>

        <div class="meeting-layout">
          <section class="meeting-main">
            <article class="panel-card meeting-head-card">
              <div>
                <h2 id="dashboard-title">실시간 모니터링</h2>
                <p id="live-transcript" class="live-transcript">실시간 자막: 대기 중...</p>
              </div>
              <p id="active-speaker-badge" class="active-speaker-badge">활성 화자: 대기 중</p>
            </article>

            <div id="speaker-stats" class="speaker-grid"></div>

            <div class="feed-grid">
              <article class="panel-card">
                <h3>실시간 발화</h3>
                <ul id="utterance-feed" class="feed"></ul>
              </article>
              <article class="panel-card">
                <h3>이벤트 타임라인</h3>
                <ul id="event-feed" class="feed"></ul>
              </article>
            </div>
          </section>

          <aside class="meeting-side">
            <article class="panel-card">
              <h3>실시간 발언 비율</h3>
              <div id="ratio-feed" class="ratio-feed"></div>
            </article>
            <article class="panel-card report-balance-card">
              <h3>균형 지수</h3>
              <p id="balance-score" class="balance-score">100</p>
              <p class="muted-copy">점수가 높을수록 발언 균형이 좋습니다.</p>
            </article>
            <article class="panel-card">
              <h3>감정 분석</h3>
              <div id="sentiment-summary" class="sentiment-summary"></div>
            </article>
            <article class="panel-card">
              <h3>회의 토픽</h3>
              <div id="topic-cloud" class="topic-cloud"></div>
            </article>
          </aside>
        </div>
      </section>
    </main>

    <script type="module" src="./dashboard.js"></script>
  </body>
</html>
